<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figuras Musicais — Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════════ */
:root {
  --bg:        #0F0E0C;
  --bg2:       #1A1916;
  --bg3:       #232119;
  --surface:   #1E1D1A;
  --surface2:  #28261F;
  --ink:       #F2EFE6;
  --ink2:      #A39E8F;
  --ink3:      #5C5750;
  --border:    rgba(242,239,230,0.08);
  --border2:   rgba(242,239,230,0.15);
  --gold:      #C9A84C;
  --gold-dim:  rgba(201,168,76,0.15);
  --green:     #4CAF7D;
  --green-dim: rgba(76,175,125,0.15);
  --red:       #C94C4C;
  --red-dim:   rgba(201,76,76,0.15);
  --blue:      #4C8EC9;
  --blue-dim:  rgba(76,142,201,0.15);
  --radius:    10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --fd:        'Playfair Display', Georgia, serif;
  --fb:        'Outfit', sans-serif;
  --ease:      cubic-bezier(0.4,0,0.2,1);
  --bottom-nav-h: 60px;
}

/* ════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }

body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--ink);
  height: 100vh;           /* fixed viewport height — enables independent scroll */
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  overflow: hidden;
}

button { font-family: var(--fb); touch-action: manipulation; }

/* ════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════ */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  flex-shrink: 0;
}

.logo {
  font-family: var(--fd);
  font-size: 1rem;
  font-weight: 500;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 24px; height: 24px;
  background: var(--gold);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.logo em { color: var(--gold); font-style: italic; }

.score-display {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.score-hits {
  font-family: var(--fd);
  font-size: 1.05rem;
  color: var(--gold);
}

/* ════════════════════════════════════════════════
   LAYOUT — DESKTOP: sidebar + content
            MOBILE:  content + bottom nav
════════════════════════════════════════════════ */
main {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;        /* sidebar and content each scroll independently */
}

/* ── Sidebar (desktop only) ── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 1.25rem 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
  height: 100%;            /* fill main height so bg extends to bottom */
}

.sidebar-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 0 1.1rem;
  margin: 8px 0 4px;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 1.1rem;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: var(--ink2);
  font-size: 0.85rem;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 0.14s var(--ease);
}
.nav-btn:hover { background: var(--bg3); color: var(--ink); }
.nav-btn.active {
  background: var(--bg3);
  color: var(--gold);
  border-left-color: var(--gold);
  font-weight: 500;
}
.nav-icon { font-size: 0.95rem; flex-shrink: 0; width: 16px; text-align: center; }
.nav-badge {
  margin-left: auto;
  font-size: 0.6rem;
  padding: 2px 6px;
  border-radius: 99px;
  background: var(--bg3);
  color: var(--ink3);
}
.nav-btn.active .nav-badge { background: var(--gold-dim); color: var(--gold); }
.sidebar-divider { height: 1px; background: var(--border); margin: 8px 1.1rem; }

/* ── Content area ── */
.content {
  flex: 1;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1.25rem 1rem;
  /* extra room above bottom nav on mobile */
  padding-bottom: calc(var(--bottom-nav-h) + 1.25rem);
  background: var(--bg);
}
@media (min-width: 640px) {
  .content {
    padding: 1.75rem 2rem 2rem;
  }
  /* cap inner content width, not the content area itself */
  #quiz-view, #ref-view {
    max-width: 660px;
  }
}

/* ── Bottom nav (mobile only) ── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bottom-nav-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  z-index: 200;
  /* safe area for notched phones */
  padding-bottom: env(safe-area-inset-bottom, 0);
  overflow-x: auto;
  overflow-y: hidden;
}
.bottom-nav-inner {
  display: flex;
  height: 100%;
  min-width: max-content;
  width: 100%;
}
.bnav-btn {
  flex: 1;
  min-width: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  border-top: 2px solid transparent;
  color: var(--ink3);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  cursor: pointer;
  padding: 6px 4px 2px;
  transition: color 0.14s;
  white-space: nowrap;
}
.bnav-btn.active {
  color: var(--gold);
  border-top-color: var(--gold);
}
.bnav-icon { font-size: 1.2rem; line-height: 1; }

/* ════════════════════════════════════════════════
   PROGRESS BAR
════════════════════════════════════════════════ */
.progress-wrap { margin-bottom: 1.25rem; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.progress-label {
  font-size: 0.68rem;
  color: var(--ink3);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.progress-track {
  height: 2px;
  background: var(--border2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 99px;
  transition: width 0.5s var(--ease);
}

/* ════════════════════════════════════════════════
   CARD
════════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem;
  animation: fadeSlide 0.22s var(--ease) both;
}
@media (min-width: 640px) {
  .card { border-radius: var(--radius-xl); padding: 1.75rem; }
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 99px;
  margin-bottom: 0.9rem;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.b-name  { background: var(--blue-dim);          color: var(--blue);  } .b-name  .badge-dot { background: var(--blue);  }
.b-draw  { background: var(--green-dim);          color: var(--green); } .b-draw  .badge-dot { background: var(--green); }
.b-time  { background: var(--gold-dim);           color: var(--gold);  } .b-time  .badge-dot { background: var(--gold);  }
.b-name2 { background: rgba(180,100,255,0.15); color: #B464FF; }         .b-name2 .badge-dot { background: #B464FF; }
.b-time2 { background: rgba(80,200,220,0.15);  color: #50C8DC; }         .b-time2 .badge-dot { background: #50C8DC; }
.b-multi { background: rgba(255,140,60,0.15);  color: #FF8C3C; }         .b-multi .badge-dot { background: #FF8C3C; }
.b-order { background: rgba(60,220,150,0.15);  color: #3CDC96; }         .b-order .badge-dot { background: #3CDC96; }
.b-comp  { background: rgba(255,90,140,0.15);  color: #FF5A8C; }         .b-comp  .badge-dot { background: #FF5A8C; }

/* ── Question text ── */
.question {
  font-family: var(--fd);
  font-size: 1.05rem;
  line-height: 1.45;
  color: var(--ink);
  margin-bottom: 1rem;
}
@media (min-width: 640px) { .question { font-size: 1.2rem; } }
.question strong { font-style: italic; font-weight: 400; color: var(--gold); }

.q-sub {
  font-size: 0.76rem;
  color: var(--ink3);
  margin: -0.6rem 0 1rem;
  line-height: 1.4;
}

/* ── Figure display ── */
.fig-center {
  display: flex;
  justify-content: center;
  margin-bottom: 1rem;
  padding: 0.9rem;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

/* ════════════════════════════════════════════════
   OPTIONS — mobile-first touch targets (min 44px)
════════════════════════════════════════════════ */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (min-width: 480px) {
  .g4 { grid-template-columns: repeat(4, 1fr); }
}

.opt {
  min-height: 48px;
  padding: 10px 10px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--ink);
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  transition: background 0.12s, border-color 0.12s;
  line-height: 1.3;
  /* prevent text selection on double-tap */
  user-select: none; -webkit-user-select: none;
}
.opt:active:not([disabled]) { background: var(--bg3); }
@media (hover: hover) {
  .opt:hover:not([disabled]) { border-color: var(--gold); background: var(--bg3); }
}
.opt[disabled] { cursor: default; }
.opt.ok  { border-color: var(--green) !important; background: var(--green-dim) !important; color: var(--green) !important; font-weight: 500; }
.opt.err { border-color: var(--red)   !important; background: var(--red-dim)   !important; color: var(--red)   !important; }
.opt.sel { border-color: var(--gold)  !important; background: var(--gold-dim)  !important; color: var(--gold)  !important; }

.draw-opt {
  min-height: 72px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  transition: background 0.12s, border-color 0.12s;
  user-select: none; -webkit-user-select: none;
}
.draw-opt:active:not([disabled]) { background: var(--bg3); }
@media (hover: hover) {
  .draw-opt:hover:not([disabled]) { border-color: var(--gold); background: var(--bg3); }
}
.draw-opt[disabled] { cursor: default; }
.draw-opt.ok  { border-color: var(--green) !important; background: var(--green-dim) !important; }
.draw-opt.err { border-color: var(--red)   !important; background: var(--red-dim)   !important; }
.draw-opt.sel { border-color: var(--gold)  !important; background: var(--gold-dim)  !important; }

/* ════════════════════════════════════════════════
   MULTI-STEP
════════════════════════════════════════════════ */
.step-block {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  transition: opacity 0.2s;
}
.step-block.locked { opacity: 0.3; pointer-events: none; }
.step-lbl {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 10px;
  color: var(--ink3);
  text-transform: uppercase;
}
.step-lbl.active { color: var(--gold); }
.step-lbl.ok     { color: var(--green); }
.step-lbl.err    { color: var(--red); }

/* ════════════════════════════════════════════════
   FEEDBACK & NEXT
════════════════════════════════════════════════ */
.feedback {
  font-size: 0.875rem;
  margin-top: 0.9rem;
  min-height: 20px;
  font-weight: 500;
}

.next-btn {
  margin-top: 0.9rem;
  width: 100%;
  min-height: 48px;
  padding: 12px;
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  background: var(--gold-dim);
  color: var(--gold);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s, color 0.15s;
  user-select: none; -webkit-user-select: none;
}
.next-btn:active { background: var(--gold); color: var(--bg); }
@media (hover: hover) {
  .next-btn:hover { background: var(--gold); color: var(--bg); }
}

/* ════════════════════════════════════════════════
   ORDER STATUS
════════════════════════════════════════════════ */
.order-status {
  margin-top: 8px;
  font-size: 0.8rem;
  color: var(--ink3);
  min-height: 18px;
}
.order-status span { color: var(--ink); font-weight: 500; }

/* ════════════════════════════════════════════════
   REFERENCE VIEW
════════════════════════════════════════════════ */
.ref-header { margin-bottom: 1.1rem; }
.ref-header h2 {
  font-family: var(--fd);
  font-size: 1.3rem;
  font-weight: 500;
  margin-bottom: 3px;
}
.ref-header p { font-size: 0.78rem; color: var(--ink3); }

.ref-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media (min-width: 400px) { .ref-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 640px) { .ref-grid { grid-template-columns: repeat(6, 1fr); } }

.ref-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 6px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.ref-fig { background: var(--bg); border-radius: 6px; padding: 4px; width: 100%; display: flex; justify-content: center; }
.ref-name { font-size: 0.72rem; font-weight: 500; color: var(--ink); text-align: center; }
.ref-time { font-size: 0.65rem; color: var(--gold); font-weight: 500; }
.ref-british { font-size: 0.6rem; color: var(--ink3); text-align: center; }

/* ════════════════════════════════════════════════
   FINAL SCREEN
════════════════════════════════════════════════ */
.final { text-align: center; padding: 1.25rem 0.5rem 1.5rem; }
.final-ring {
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 1.1rem;
  background: var(--bg);
}
.final-num {
  font-family: var(--fd);
  font-size: 2.2rem;
  font-weight: 500;
  line-height: 1;
  color: var(--gold);
}
.final-denom { font-size: 0.78rem; color: var(--ink3); margin-top: 2px; }
.final-msg {
  font-family: var(--fd);
  font-size: 1.1rem;
  color: var(--ink);
  margin-bottom: 4px;
}
.final-sub { font-size: 0.8rem; color: var(--ink3); margin-bottom: 1.25rem; }

.pills-wrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 1.5rem; }
.pill { font-size: 0.7rem; font-weight: 500; padding: 4px 10px; border-radius: 99px; }

.restart-btn {
  min-height: 48px;
  padding: 12px 32px;
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  background: var(--gold);
  color: var(--bg);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity 0.15s;
}
.restart-btn:active { opacity: 0.8; }
@media (hover: hover) { .restart-btn:hover { opacity: 0.85; } }

/* ════════════════════════════════════════════════
   DISSERTATIVE INPUT
════════════════════════════════════════════════ */
.diss-wrap { margin-top: 0.5rem; }

.diss-input {
  width: 100%;
  min-height: 52px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: var(--fb);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.14s, background 0.14s;
  /* prevent zoom on iOS */
  font-size: max(1rem, 16px);
}
.diss-input::placeholder { color: var(--ink3); }
.diss-input:focus { border-color: var(--gold); }
.diss-input.ok  { border-color: var(--green) !important; background: var(--green-dim) !important; color: var(--green); }
.diss-input.err { border-color: var(--red)   !important; background: var(--red-dim)   !important; }
.diss-input:disabled { cursor: default; }

.diss-hint {
  font-size: 0.7rem;
  color: var(--ink3);
  margin-top: 5px;
  line-height: 1.4;
}

.diss-submit {
  margin-top: 8px;
  width: 100%;
  min-height: 48px;
  padding: 11px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--ink2);
  font-family: var(--fb);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: border-color 0.14s, color 0.14s;
  user-select: none; -webkit-user-select: none;
}
.diss-submit:active:not([disabled]) { border-color: var(--gold); color: var(--gold); }
@media (hover: hover) {
  .diss-submit:hover:not([disabled]) { border-color: var(--gold); color: var(--gold); }
}
.diss-submit:disabled { opacity: 0.35; cursor: default; }

/* ════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════════════════════ */
/* Mobile: hide sidebar, show bottom nav */
@media (max-width: 639px) {
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
}
/* Desktop: hide bottom nav */
@media (min-width: 640px) {
  .bottom-nav { display: none; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">
    <div class="logo-icon">♩</div>
    figuras <em>musicais</em>
  </div>
  <div class="score-display">
    <span class="score-hits" id="score-hits">0</span>
    <span>/ <span id="score-total">0</span></span>
  </div>
</header>

<main>
  <!-- ══ SIDEBAR (desktop) ══ -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- ══ CONTENT ══ -->
  <div class="content">
    <div id="quiz-view">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label" id="q-counter">Questão 1 de 14</span>
          <span class="progress-label" id="q-type-hint"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="pb" style="width:0%"></div>
        </div>
      </div>
      <div class="card" id="card">Carregando…</div>
    </div>

    <div id="ref-view" style="display:none">
      <div class="ref-header">
        <h2>Referência</h2>
        <p>Compasso 4/4 — Semibreve = 4 tempos</p>
      </div>
      <div class="ref-grid" id="ref-grid"></div>
    </div>
  </div>
</main>

<!-- ══ BOTTOM NAV (mobile) ══ -->
<nav class="bottom-nav" id="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
</nav>

<script>
/* ════════════════════════════════════════════════════════════════
   ██████████████████████████████████████████████████████████████
   ██                                                          ██
   ██   FIGURAS MUSICAIS QUIZ — ARQUITECTURA MODULAR          ██
   ██                                                          ██
   ██   Para adicionar um novo módulo, basta registrar um     ██
   ██   objeto em MODULES abaixo. O sistema cuida do resto.   ██
   ██                                                          ██
   ██████████████████████████████████████████████████████████████
   ════════════════════════════════════════════════════════════════

   ESTRUTURA DE UM MÓDULO:
   {
     id:       string único (slug, ex: 'pauses')
     label:    string curto para a sidebar (ex: 'Pausas')
     icon:     emoji ou símbolo
     badge:    texto opcional no nav (ex: 'novo', 'beta')
     figures:  Array<{ name, frac, beats, british? }>
     questions: Array<QuestionFactory>
       — QuestionFactory é uma função que recebe (figures) e
         retorna um objeto { badge, badgeClass, typeKey, render() }
         onde render() chama setCard(html) e registra handlers.
   }

   MÓDULO MÍNIMO EXEMPLO (pode colar abaixo de MODULES):
   ───────────────────────────────────────────────────────
   MODULES.push({
     id: 'meu-modulo',
     label: 'Meu módulo',
     icon: '🎵',
     badge: 'novo',
     figures: [ ...FIGURES ], // pode reutilizar as figuras base
     questions: [ qNameFromDraw, qTimeFromDraw ] // qualquer subconjunto
   });
   ════════════════════════════════════════════════════════════════ */

/* ── Figura base (compartilhada entre módulos) ── */

  { name:"Semibreve",    frac:"4 tempos",  beats:4,     british:"Whole note",      kind:"nota" },
  { name:"Mínima",       frac:"2 tempos",  beats:2,     british:"Half note",       kind:"nota" },
  { name:"Semínima",     frac:"1 tempo",   beats:1,     british:"Quarter note",    kind:"nota" },

  { name:"Semicolcheia", frac:"¼ tempo",   beats:0.25,  british:"Sixteenth note",  kind:"nota" },
  { name:"Fusa",         frac:"⅛ tempo",   beats:0.125, british:"32nd note",       kind:"nota" },
];

/* Pausas — mesmas durações, símbolos próprios */
const PAUSES = [
  { name:"Pausa de semibreve",    frac:"4 tempos",  beats:4,     british:"Whole rest",      kind:"pausa" },
  { name:"Pausa de mínima",       frac:"2 tempos",  beats:2,     british:"Half rest",       kind:"pausa" },
  { name:"Pausa de semínima",     frac:"1 tempo",   beats:1,     british:"Quarter rest",    kind:"pausa" },
  { name:"Pausa de colcheia",     frac:"½ tempo",   beats:0.5,   british:"Eighth rest",     kind:"pausa" },
  { name:"Pausa de semicolcheia", frac:"¼ tempo",   beats:0.25,  british:"Sixteenth rest",  kind:"pausa" },

/* ════════════════════════════════════════════════
   SVG RENDERER
════════════════════════════════════════════════ */
function noteSVG(f, w, h) {
  const c = '#C9C4B8';
  const staff = [20,30,40,50,60]
    .map(y=>`<line x1="4" y1="${y}" x2="96" y2="${y}" stroke="${c}" stroke-width="0.7" opacity="0.18"/>`)
    .join('');
  const nx=38, ny=46;
  let sh = '';
  if (f.name === "Semibreve") {
    sh = `<ellipse cx="${nx+4}" cy="${ny}" rx="14" ry="9" stroke="${c}" stroke-width="2" fill="none"/>`;
  } else {
    const filled = f.name !== "Mínima";
    sh = `<ellipse cx="${nx}" cy="${ny}" rx="13" ry="9"
            fill="${filled ? c : 'none'}" stroke="${c}" stroke-width="2"
            transform="rotate(-18 ${nx} ${ny})"/>
          <line x1="${nx+12}" y1="${ny-5}" x2="${nx+12}" y2="${ny-36}" stroke="${c}" stroke-width="2"/>`;
    if (f.name === "Colcheia")
      sh += `<path d="M${nx+12},${ny-36} Q${nx+28},${ny-25} ${nx+19},${ny-12}" stroke="${c}" stroke-width="2" fill="none"/>`;
    else if (f.name === "Semicolcheia")
      sh += `<path d="M${nx+12},${ny-36} Q${nx+28},${ny-25} ${nx+19},${ny-12}" stroke="${c}" stroke-width="2" fill="none"/>
             <path d="M${nx+12},${ny-26} Q${nx+28},${ny-15} ${nx+19},${ny-2}"  stroke="${c}" stroke-width="2" fill="none"/>`;
    else if (f.name === "Fusa")
      sh += `<path d="M${nx+12},${ny-36} Q${nx+28},${ny-25} ${nx+19},${ny-12}" stroke="${c}" stroke-width="2" fill="none"/>
             <path d="M${nx+12},${ny-28} Q${nx+28},${ny-17} ${nx+19},${ny-4}"  stroke="${c}" stroke-width="2" fill="none"/>
             <path d="M${nx+12},${ny-20} Q${nx+28},${ny-9}  ${nx+19},${ny+4}"  stroke="${c}" stroke-width="2" fill="none"/>`;
  }
  return `<svg viewBox="0 0 100 80" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${staff}${sh}</svg>`;
}

/* ════════════════════════════════════════════════
   SVG RENDERER — PAUSAS
   Símbolos convencionais no pentagrama.
   Linhas do pentagrama: y = 20, 30, 40, 50, 60
   Linha 1=topo(y=20) … Linha 5=baixo(y=60)
   Pausa de semibreve: retângulo pendurado ABAIXO da 4ª linha (y=50)
   Pausa de mínima:    retângulo sentado SOBRE a 3ª linha (y=40)
════════════════════════════════════════════════ */
function pauseSVG(f, w, h) {
  const c = '#C9C4B8';
  const staff = [20,30,40,50,60]
    .map(y=>`<line x1="4" y1="${y}" x2="96" y2="${y}" stroke="${c}" stroke-width="0.7" opacity="0.18"/>`)
    .join('');
  let sh = '';
  const cx = 50;

  if (f.name === "Pausa de semibreve") {
    // Retângulo pendurado abaixo da 4ª linha (y=50): ocupa y=50 a y=57
    sh = `<rect x="${cx-13}" y="50" width="26" height="7" fill="${c}" rx="1"/>`;

  } else if (f.name === "Pausa de mínima") {
    // Retângulo sentado sobre a 3ª linha (y=40): ocupa y=33 a y=40
    sh = `<rect x="${cx-13}" y="33" width="26" height="7" fill="${c}" rx="1"/>`;

  } else if (f.name === "Pausa de semínima") {
    // Gancho: haste vertical + cabeça curva (símbolo convencional em Z invertido)
    sh = `
      <line x1="${cx+2}" y1="26" x2="${cx+2}" y2="52" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="${cx+2}" y1="26" x2="${cx+10}" y2="26" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M${cx+2},52 Q${cx-6},52 ${cx-6},44 Q${cx-6},38 ${cx+2},38"
        stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;

  } else if (f.name === "Pausa de colcheia") {
    // Haste + uma bandeira curva
    sh = `
      <line x1="${cx+2}" y1="28" x2="${cx+2}" y2="54" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx+2}" cy="54" r="4" fill="${c}"/>
      <path d="M${cx+2},28 Q${cx+18},34 ${cx+10},46" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;

  } else if (f.name === "Pausa de semicolcheia") {
    // Haste + duas bandeiras curvas
    sh = `
      <line x1="${cx+2}" y1="24" x2="${cx+2}" y2="56" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx+2}" cy="56" r="3.5" fill="${c}"/>
      <path d="M${cx+2},24 Q${cx+18},30 ${cx+10},42" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M${cx+2},36 Q${cx+18},42 ${cx+10},54" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;

  } else if (f.name === "Pausa de fusa") {
    // Haste + três bandeiras curvas
    sh = `
      <line x1="${cx+2}" y1="20" x2="${cx+2}" y2="58" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx+2}" cy="58" r="3.5" fill="${c}"/>
      <path d="M${cx+2},20 Q${cx+18},26 ${cx+10},38" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M${cx+2},31 Q${cx+18},37 ${cx+10},49" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M${cx+2},42 Q${cx+18},48 ${cx+10},60" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  }

  return `<svg viewBox="0 0 100 80" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${staff}${sh}</svg>`;
}

/* Dispatcher: nota ou pausa */
function figureSVG(f, w, h) {
  return f.kind === 'pausa' ? pauseSVG(f, w, h) : noteSVG(f, w, h);
}

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function shuf(a)       { return [...a].sort(() => Math.random() - 0.5); }
function others(f,n,arr){ return shuf((arr||FIGURES).filter(x=>x!==f)).slice(0,n); }
function rand(arr)     { const a=arr||FIGURES; return a[Math.floor(Math.random()*a.length)]; }

function setCard(html) {
  const card = document.getElementById('card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';
  card.innerHTML = html;
}

function nextBtn(label) {
  return `<button class="next-btn" id="nb" style="display:none" onclick="ENGINE.advance()">
    ${label||'Próxima questão →'}
  </button>`;
}

   DISSERTATIVE HELPERS
════════════════════════════════════════════════ */

/* Normaliza texto para comparação: sem acentos, minúsculas, espaços únicos */
function normalize(s) {
  return String(s).trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip diacritics
    .replace(/[()]/g, '')                              // ignore parens
    .replace(/\s+/g, ' ').trim();
}

/* Aceita variantes numéricas e textuais das durações */
const FRAC_ALIASES = {
  '4 tempos': ['4','4 tempos','quatro tempos','quatro'],
  '2 tempos': ['2','2 tempos','dois tempos','dois'],
  '1 tempo':  ['1','1 tempo','um tempo','um'],
  '½ tempo':  ['1/2','meio','meio tempo','0,5','0.5','½ tempo','1/2 tempo','metade'],
  '¼ tempo':  ['1/4','quarto','um quarto','0,25','0.25','¼ tempo','1/4 tempo'],
  '⅛ tempo':  ['1/8','oitavo','um oitavo','0,125','⅛ tempo','1/8 tempo'],
};

/* Retorna lista de aliases normalizados para uma resposta */
function fracAliases(frac) {
  const list = FRAC_ALIASES[frac] || [frac];
  return list.map(normalize);
}

function nameAliases(name) {
  const base = [name, normalize(name)];
  // Allow "pausa X" as shorthand for "pausa de X"
  if (name.startsWith('Pausa de ')) {
    const short = name.replace('Pausa de ', 'pausa ');
    base.push(normalize(short));
  }
  return [...new Set(base.map(normalize))];
}

/* Builds dissertative input HTML */
function dissInput(id, placeholder, hint) {
  return `<div class="diss-wrap">
    <input class="diss-input" id="${id}" type="text"
      placeholder="${placeholder}"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){document.getElementById('diss-submit').click();}"/>
    ${hint ? `<div class="diss-hint">${hint}</div>` : ''}
    <button class="diss-submit" id="diss-submit" onclick="ENGINE.submitDiss()">Responder</button>
  </div>`;
}

function qDrawFromName(figs) {
  return {
    badge:'Identificar desenho', badgeClass:'b-draw', typeKey:'d',
    render() {
      const f=rand(figs);
      const word = f.kind==='pausa' ? 'pausa' : 'figura';
      // Keep wrong options within the same kind to avoid mixed visual pools
      const sameKind = figs.filter(x=>x.kind===f.kind);
      const pool = shuf([f, ...others(f, 3, sameKind.length >= 4 ? sameKind : figs)]);
      setCard(`<span class="badge b-draw"><span class="badge-dot"></span>Identificar desenho</span>

function qSumBeats(figs) {
  return {
    badge:'Soma de durações', badgeClass:'b-multi', typeKey:'m', isMulti:true,
    render() {
      // Usar apenas notas (kind='nota') para evitar ambiguidade com pausas de mesmo valor
      const notas = figs.filter(f=>f.kind==='nota').length > 0
        ? figs.filter(f=>f.kind==='nota')
        : figs;
      // Construir pares com soma única (sem outra combinação chegando ao mesmo total)
      const allPairs=[];
      for(let i=0;i<notas.length;i++) for(let j=i;j<notas.length;j++){
        const s=notas[i].beats+notas[j].beats;
        if(s<=4.5) allPairs.push([notas[i],notas[j],s]);
      }
      // Filtrar pares cuja soma só pode ser obtida de uma forma
      const sumCount={};
      allPairs.forEach(([a,b,s])=>{ sumCount[s]=(sumCount[s]||0)+1; });
      const uniquePairs = allPairs.filter(([a,b,s])=>sumCount[s]===1);
      const source = uniquePairs.length > 0 ? uniquePairs : allPairs;
      const [a,b,tot]=shuf(source)[0];
      const fracLabel = (n) => {
        if (n === 4) return '4 tempos';
        if (n === 2) return '2 tempos';
        if (n === 1) return '1 tempo';
        if (n === 0.5) return '½ tempo';
        if (n === 0.25) return '¼ tempo';
        if (n === 0.125) return '⅛ tempo';
        if (n === 1.5) return '1 tempo e meio';
        if (n === 2.5) return '2 tempos e meio';
        if (n === 0.75) return '¾ de tempo';
        if (n === 0.375) return '⅜ de tempo';
        if (n === 0.625) return '⅝ de tempo';
        if (Number.isInteger(n)) return `${n} tempos`;
        return `${n} tempo(s)`;
      };
      const lbl = fracLabel(tot);
      const aOpts=shuf([a.name,...others(a,3,notas).map(x=>x.name)]);
      const bOpts=shuf([b.name,...others(b,3,notas).map(x=>x.name)]);
      ENGINE.multiStep=0; ENGINE.multiAllOk=true;
      setCard(`<span class="badge b-multi"><span class="badge-dot"></span>Soma de durações</span>
        <div class="question">Duas figuras juntas somam <strong>${lbl}</strong> no total.</div>
        <p class="q-sub">Considerando compasso 4/4, onde a semínima vale 1 tempo.</p>
        <div class="step-block" id="sb0">
          <div class="step-lbl active" id="sl0">① Primeira figura (${a.frac}):</div>
          <div class="g2">${aOpts.map(o=>`<button class="opt" onclick="ENGINE.pickMultiStep(this,0,'${a.name}')" data-v="${o}">${o}</button>`).join('')}</div>
        </div>
        <div class="step-block locked" id="sb1">
          <div class="step-lbl" id="sl1">② Segunda figura (${b.frac}):</div>
          <div class="g2">${bOpts.map(o=>`<button class="opt" onclick="ENGINE.pickMultiStep(this,1,'${b.name}')" data-v="${o}">${o}</button>`).join('')}</div>
        </div>
        <div class="feedback" id="fb"></div>${nextBtn()}`);
      document.getElementById('q-type-hint').textContent = 'Soma';
    }
  };
}

/*
  Cada compasso tem:
    sig      — string "N/D" exibida no pentagrama
    num      — numerador  (quantas figuras por compasso)
    den      — denominador (que figura vale 1 tempo: 4=semínima, 8=colcheia, 2=mínima)
    name     — nome legível
    tempos   — total de tempos por compasso (= num, quando den=4)
    unidade  — nome da figura que representa 1 tempo
    grupo    — binário | ternário | quaternário | composto
    simples  — true se compasso simples, false se composto
*/
const COMPASSOS = [
  // ── Compassos simples (a figura do denominador = 1 tempo) ──
  { sig:'2/4',  num:2, den:4, name:'Binário simples (2/4)',         tempos:2, unidade:'semínima',  grupo:'binário',     simples:true  },
  { sig:'3/4',  num:3, den:4, name:'Ternário simples (3/4)',        tempos:3, unidade:'semínima',  grupo:'ternário',    simples:true  },
  { sig:'4/4',  num:4, den:4, name:'Quaternário simples (4/4)',     tempos:4, unidade:'semínima',  grupo:'quaternário', simples:true  },
  { sig:'2/2',  num:2, den:2, name:'Binário simples (2/2)',         tempos:2, unidade:'mínima',    grupo:'binário',     simples:true  },
  { sig:'3/2',  num:3, den:2, name:'Ternário simples (3/2)',        tempos:3, unidade:'mínima',    grupo:'ternário',    simples:true  },
  { sig:'3/8',  num:3, den:8, name:'Ternário simples (3/8)',        tempos:3, unidade:'colcheia',  grupo:'ternário',    simples:true  },
  // ── Compassos compostos (cada tempo = figura pontuada; numerador = tempos × 3) ──
  { sig:'6/8',  num:6, den:8, name:'Binário composto (6/8)',        tempos:2, unidade:'semínima pontuada', grupo:'binário',     simples:false },
  { sig:'9/8',  num:9, den:8, name:'Ternário composto (9/8)',       tempos:3, unidade:'semínima pontuada', grupo:'ternário',    simples:false },
  { sig:'12/8', num:12,den:8, name:'Quaternário composto (12/8)',   tempos:4, unidade:'semínima pontuada', grupo:'quaternário', simples:false },
  { sig:'6/4',  num:6, den:4, name:'Binário composto (6/4)',        tempos:2, unidade:'mínima pontuada',   grupo:'binário',     simples:false },
];

/* Mapa denominador → nome da figura */
const DEN_NOME = { 1:'semibreve', 2:'mínima', 4:'semínima', 8:'colcheia', 16:'semicolcheia' };

/* SVG de fórmula de compasso no pentagrama */
function compassoSVG(c, w, h) {
  const ink = '#C9C4B8';
  const staff = [18,28,38,48,58]
    .map(y=>`<line x1="4" y1="${y}" x2="96" y2="${y}" stroke="${ink}" stroke-width="0.8" opacity="0.22"/>`)
    .join('');

  // Fórmula centralizada: dois números empilhados
  const numStr  = String(c.num);
  const denStr  = String(c.den);
  // Usa texto grande; ajusta tamanho para numbers largos (12/8)
  const fs = numStr.length > 1 || denStr.length > 1 ? 26 : 30;
  const cx = 50;

  const formula = `
    <text x="${cx}" y="38" text-anchor="middle" font-family="Georgia,serif"
      font-size="${fs}" font-weight="bold" fill="${ink}">${numStr}</text>
    <text x="${cx}" y="60" text-anchor="middle" font-family="Georgia,serif"
      font-size="${fs}" font-weight="bold" fill="${ink}">${denStr}</text>`;

  return `<svg viewBox="0 0 100 80" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
    ${staff}${formula}
  </svg>`;
}

/* ── Helpers de texto ── */
function cOthers(c, n, arr) { return shuf((arr||COMPASSOS).filter(x=>x!==c)).slice(0,n); }
function cRand(arr)          { const a=arr||COMPASSOS; return a[Math.floor(Math.random()*a.length)]; }

    badge:'Unidade de tempo', badgeClass:'b-time2', typeKey:'t2',
    render() {
      const c=cRand(compassos);

      const wrong=shuf(allUnits.filter(u=>u!==c.unidade)).slice(0,3);
      const opts=shuf([c.unidade,...wrong]);

        : `<p class="q-sub">Em compassos compostos, a unidade de tempo é uma figura <em>pontuada</em> (vale 3 subdivisões).</p>`;
      setCard(`<span class="badge b-time2"><span class="badge-dot"></span>Unidade de tempo</span>
        <div class="question">Que figura representa <strong>1 tempo</strong> neste compasso?</div>

        ${sub}
        <div class="g2">${opts.map(o=>`<button class="opt" onclick="ENGINE.pickSimple(this,\`${c.unidade}\`,'t2')" data-v="${o}">${o}</button>`).join('')}</div>

}

/* Q11 — Ordenar 3 compassos por número de tempos (sem empates) */
function cqOrdemTempos(compassos) {
  return {
    badge:'Ordenar compassos', badgeClass:'b-order', typeKey:'m', isMulti:true,
    render() {
      // Escolher 3 compassos com tempos distintos para evitar ambiguidade
      let pool;
      const byTempos = {};
      compassos.forEach(c => { if(!byTempos[c.tempos]) byTempos[c.tempos]=c; });
      const distinct = Object.values(byTempos);
      if (distinct.length >= 3) {
        pool = shuf(distinct).slice(0,3);
      } else {
        pool = shuf(compassos).slice(0,3);
      }
      const sorted=[...pool].sort((a,b)=>a.tempos-b.tempos||a.num-b.num);
      const poolMapped  = pool.map(c=>({...c, name:c.sig}));
      const sortedNames = sorted.map(c=>c.sig);
      ENGINE.orderState={ sorted:poolMapped, sortedNames, picked:[], pool:poolMapped };
      const btns=poolMapped.map((c,i)=>`
        <button class="opt" style="padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px"
          id="ob${i}" onclick="ENGINE.pickOrder(this,'${c.sig}')" data-v="${c.sig}">
          ${compassoSVG(c,64,52)}
          <span style="font-size:0.72rem;color:var(--ink3)">${c.tempos} tempo${c.tempos>1?'s':''}</span>
        </button>`).join('');
      setCard(`<span class="badge b-order"><span class="badge-dot"></span>Ordenar compassos</span>
        <div class="question">Ordene os compassos do <strong>menor</strong> para o <strong>maior</strong> número de tempos por compasso:</div>
        <div class="g3" style="margin-bottom:10px">${btns}</div>
        <div class="order-status">Ordem: <span id="ord-txt">—</span></div>
        <div class="feedback" id="fb"></div>${nextBtn()}`);
      document.getElementById('q-type-hint').textContent = 'Ordenar';
    }
  };
}

/* ════════════════════════════════════════════════
   ENGINE — estado e lógica de quiz
════════════════════════════════════════════════ */
const ENGINE = {
  MAX_Q: 14,
  hits: 0, total: 0, qCount: 0,
  bk: {}, bkT: {},
  queue: [],
  multiStep: 0, multiAllOk: true,
  orderState: null,
  activeModule: null,

  init(moduleId) {
    this.hits=0; this.total=0; this.qCount=0;
    this.bk={}; this.bkT={};
    this.queue=[];
    this.multiStep=0; this.multiAllOk=true; this.orderState=null;
    this.activeModule = MODULES.find(m=>m.id===moduleId) || MODULES[0];
    this.updateScoreUI();
    this.updateProgressUI();
    this.buildQueue();
    this.queue.shift()();
  },

  buildQueue() {
    const mod = this.activeModule;
    const allQ = mod.questions.map(f=>f(mod.figures)).filter(Boolean);
    const simpleQ = allQ.filter(q=>!q.isMulti && !q.isDiss);
    const multiQ  = allQ.filter(q=> q.isMulti);
    const dissQ   = allQ.filter(q=> q.isDiss);
    // Ratios per round of MAX_Q: ~7 simple, ~2 multi, ~2 dissertative (if available)
    const simple = shuf(simpleQ).map(q=>q.render.bind(q));
    const multi  = shuf(multiQ).slice(0,2).map(q=>q.render.bind(q));
    const diss   = shuf(dissQ).slice(0,2).map(q=>q.render.bind(q));
    this.queue = shuf([...simple, ...multi, ...diss]);
  },

  advance() {
    if (this.qCount >= this.MAX_Q) { this.showFinal(); return; }
    if (this.queue.length === 0) this.buildQueue();
    this.queue.shift()();
  },

  scoreSimple(type, ok) {
    this.total++; this.bkT[type]=(this.bkT[type]||0)+1;
    if(ok){ this.hits++; this.bk[type]=(this.bk[type]||0)+1; }
    this.qCount++;
    this.updateScoreUI(); this.updateProgressUI(); this.showNextBtn();
  },

  scoreMulti(ok) {
    this.total++; this.bkT.m=(this.bkT.m||0)+1;
    if(ok){ this.hits++; this.bk.m=(this.bk.m||0)+1; }
    this.qCount++;
    this.updateScoreUI(); this.updateProgressUI(); this.showNextBtn();
  },

  showNextBtn() {
    const nb=document.getElementById('nb');
    if(nb){ nb.textContent=this.qCount>=this.MAX_Q?'Ver resultado →':'Próxima questão →'; nb.style.display=''; }
  },

  updateScoreUI() {
    document.getElementById('score-hits').textContent  = this.hits;
    document.getElementById('score-total').textContent = this.total;
  },

  updateProgressUI() {
    const ratio = Math.min(this.qCount, this.MAX_Q) / this.MAX_Q;
    document.getElementById('pb').style.width = (ratio*100)+'%';
    document.getElementById('q-counter').textContent =
      'Questão '+(Math.min(this.qCount+1,this.MAX_Q))+' de '+this.MAX_Q;
  },

  /* ── Dissertative state ── */
  _dissAns: '',
  _dissAliases: [],
  _dissType: 'e',

  submitDiss() {
    const input = document.getElementById('diss-in');
    const submit = document.getElementById('diss-submit');
    if (!input || input.disabled) return;
    const val = normalize(input.value);
    if (!val) { input.focus(); return; } // don't submit empty
    const ok = this._dissAliases.some(a => a === val);
    input.disabled = true;
    if (submit) submit.disabled = true;
    input.classList.add(ok ? 'ok' : 'err');
    const fb = document.getElementById('fb');
    fb.textContent = ok ? '✓ Correto!' : '✗ Correto: ' + this._dissAns;
    fb.style.color = ok ? 'var(--green)' : 'var(--red)';
    this.scoreSimple(this._dissType, ok);
  },

  /* ── Handlers ── */
  pickSimple(btn, ans, type) {
    if(btn.disabled) return;
    const allBtns = [...document.querySelectorAll('.g2 .opt, .g3 .opt, .g4 .opt')];
    allBtns.forEach(b=>b.disabled=true);
    const ok = btn.dataset.v === ans;
    allBtns.forEach(b=>{
      if(b.dataset.v===ans) b.classList.add('ok');
      else if(b===btn&&!ok) b.classList.add('err');
    });
    const el=document.getElementById('fb');
    el.textContent=ok?'✓ Correto!':'✗ Correto: '+ans;
    el.style.color=ok?'var(--green)':'var(--red)';
    this.scoreSimple(type,ok);
  },

  pickDraw(btn, ans, type) {
    if(btn.disabled) return;
    const allBtns=[...document.querySelectorAll('.draw-opt, .g2 .opt, .g3 .opt, .g4 .opt')];
    allBtns.forEach(b=>b.disabled=true);
    const ok=btn.dataset.v===ans;
    allBtns.forEach(b=>{
      if(b.dataset.v===ans) b.classList.add('ok');
      else if(b===btn&&!ok) b.classList.add('err');
    });
    const el=document.getElementById('fb');
    el.textContent=ok?'✓ Correto!':'✗ Correto: '+ans;
    el.style.color=ok?'var(--green)':'var(--red)';
    this.scoreSimple(type,ok);
  },

  pickMultiStep(btn, step, ans) {
    if(step!==this.multiStep||btn.disabled) return;
    const ok=btn.dataset.v===ans;
    if(!ok) this.multiAllOk=false;
    const block=document.getElementById('sb'+step);
    block.querySelectorAll('.opt').forEach(b=>{
      b.disabled=true;
      if(b.dataset.v===ans) b.classList.add('ok');
      else if(b===btn&&!ok) b.classList.add('err');
    });
    const sl=document.getElementById('sl'+step);
    sl.classList.remove('active'); sl.classList.add(ok?'ok':'err');
    this.multiStep++;
    const next=document.getElementById('sb'+this.multiStep);
    if(next){
      next.classList.remove('locked');
      document.getElementById('sl'+this.multiStep).classList.add('active');
    } else {
      const el=document.getElementById('fb');
      el.textContent=this.multiAllOk?'✓ Tudo certo!':'✗ Alguma resposta errada.';
      el.style.color=this.multiAllOk?'var(--green)':'var(--red)';
      this.scoreMulti(this.multiAllOk);
    }
  },

  pickOrder(btn, name) {
    if(!this.orderState||btn.disabled) return;
    btn.disabled=true; btn.classList.add('sel');
    this.orderState.picked.push(name);
    document.getElementById('ord-txt').textContent=this.orderState.picked.join(' → ');
    if(this.orderState.picked.length===this.orderState.pool.length){
      const sortedKeys = this.orderState.sortedNames || this.orderState.sorted.map(f=>f.name);
      const ok=JSON.stringify(this.orderState.picked)===JSON.stringify(sortedKeys);
      this.orderState.pool.forEach((f,i)=>{
        const b=document.getElementById('ob'+i);
        b.classList.remove('sel');
        const ci=sortedKeys.indexOf(f.name);
        const pi=this.orderState.picked.indexOf(f.name);
        b.classList.add(ci===pi?'ok':'err');
      });
      const el=document.getElementById('fb');
      el.textContent=ok?'✓ Ordem correta!':'✗ Correta: '+sortedKeys.join(' → ');
      el.style.color=ok?'var(--green)':'var(--red)';
      this.scoreMulti(ok);
    }
  },

  /* ── Final screen ── */
  showFinal() {
    document.getElementById('q-type-hint').textContent='';
    document.getElementById('q-counter').textContent='Concluído';
    document.getElementById('pb').style.width='100%';
    const pct=Math.round(this.hits/this.MAX_Q*100);
    const msg=pct>=80?'Excelente domínio!':pct>=60?'Muito bom, continue!':pct>=40?'Bom progresso!':'Revise a referência!';

    const defs=[
      {k:'n',  label:'Nome do desenho',    bg:'rgba(76,142,201,0.2)',  col:'#4C8EC9'},
      {k:'d',  label:'Desenho do nome',    bg:'rgba(76,175,125,0.2)',  col:'#4CAF7D'},
      {k:'t',  label:'Duração do símbolo', bg:'rgba(201,168,76,0.2)',  col:'#C9A84C'},
      {k:'t2', label:'Duração do nome',    bg:'rgba(80,200,220,0.2)',  col:'#50C8DC'},
      {k:'n2', label:'Nome da duração',    bg:'rgba(180,100,255,0.2)', col:'#B464FF'},
      {k:'m',  label:'Compostas',          bg:'rgba(255,140,60,0.2)',  col:'#FF8C3C'},
      {k:'e',  label:'Dissertativas',      bg:'rgba(255,90,140,0.2)',  col:'#FF5A8C'},
    ];
    const pills=defs.filter(d=>(this.bkT[d.k]||0)>0)
      .map(d=>`<span class="pill" style="background:${d.bg};color:${d.col}">${d.label}: ${this.bk[d.k]||0}/${this.bkT[d.k]}</span>`)
      .join('');

    setCard(`<div class="final">
      <div class="final-ring">
        <div class="final-num">${this.hits}</div>
        <div class="final-denom">de ${this.MAX_Q}</div>
      </div>
      <div class="final-msg">${msg}</div>
      <div class="final-sub">${pct}% de acerto nesta rodada</div>
      <div class="pills-wrap">${pills}</div>
      <button class="restart-btn" onclick="ENGINE.init('${this.activeModule.id}')">Recomeçar</button>
    </div>`);
  }
};

  function addLabel(text) {
    const el = document.createElement('div');
    el.className = 'sidebar-label';
    el.textContent = text;
    sidebar.appendChild(el);
  }
  function addDivider() {
    const el = document.createElement('div');
    el.className = 'sidebar-divider';
    sidebar.appendChild(el);
  }

  function addNavBtn(entry, isFirst) {
    // Sidebar button
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (isFirst ? ' active' : '');
    btn.id = 'nav-' + entry.id;
    btn.innerHTML = `<span class="nav-icon">${entry.icon}</span>${entry.label}${entry.badge ? `<span class="nav-badge">${entry.badge}</span>` : ''}`;
    btn.onclick = () => activate(entry);
    sidebar.appendChild(btn);

    // Bottom nav button
    const bb = document.createElement('button');
    bb.className = 'bnav-btn' + (isFirst ? ' active' : '');
    bb.id = 'bnav-' + entry.id;
    bb.innerHTML = `<span class="bnav-icon">${entry.icon}</span>${entry.label}`;
    bb.onclick = () => activate(entry);
    bnavInner.appendChild(bb);
  }

  addLabel('Figuras & Pausas');
  figModules.forEach((mod, i) => addNavBtn(mod, i === 0));
  addDivider();
  addLabel('Teoria');
  compModules.forEach(mod => addNavBtn(mod, false));
  addDivider();
  addLabel('Estudo');
  addNavBtn(refEntry, false);
}

function activate(entry) {
  // Update all nav buttons
  document.querySelectorAll('.nav-btn, .bnav-btn').forEach(b => b.classList.remove('active'));
  const sb = document.getElementById('nav-' + entry.id);
  const bb = document.getElementById('bnav-' + entry.id);
  if (sb) sb.classList.add('active');
  if (bb) bb.classList.add('active');

  if (entry.isRef) {
    setView('ref');
    const mod = ENGINE.activeModule;
    if (mod && mod.renderRef) mod.renderRef(mod.figures);
    else renderRef(mod?.figures || FIGURES);
  } else {
    setView('quiz');
    // Scroll content to top on mobile
    document.querySelector('.content').scrollTop = 0;
    ENGINE.init(entry.id);
  }
}

function setView(v) {
  document.getElementById('quiz-view').style.display = v==='quiz' ? '' : 'none';
  document.getElementById('ref-view').style.display  = v==='ref'  ? '' : 'none';
}

function renderRef(figs) {
  figs = figs || FIGURES;
  document.getElementById('ref-grid').innerHTML = figs.map(f=>`
    <div class="ref-item">
      <div class="ref-fig">${figureSVG(f,70,52)}</div>
      <span class="ref-name">${f.name}</span>
      <span class="ref-time">${f.frac}</span>
      ${f.british ? `<span class="ref-british">${f.british}</span>` : ''}
    </div>`).join('');
}

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
setTimeout(function() {
  buildSidebar();
  renderRef(FIGURES);
  ENGINE.init('figuras');
}, 0);

</script>
</body>
</html>
