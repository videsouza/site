<h1>Poética I — O intervalo da luz</h1>

<p class="meta">Poética · s.d.</p>

<section class="conteudo">

<p class="epigrafe">“Há um instante que não se repete.”</p>

<p>
A luz atravessa a tarde  
como quem hesita —
</p>

<p>
não é ainda noite,  
mas já não é dia.
</p>

<p>
Entre uma coisa e outra,  
algo se sustém:
</p>

<p>
um nome que não digo,  
um gesto que não faço.
</p>
